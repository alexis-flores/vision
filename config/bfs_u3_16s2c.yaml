# Camera config for the FLIR BFS-U3-16S2C-CS (YAML twin of bfs_u3_16s2c.json).
# Loaded by config_loader.load_camera_config() -> CameraConfig. YAML support needs
# the optional extra:  pip install -e ".[yaml]"
# Use it with:  python app.py --backend spinnaker --config config/bfs_u3_16s2c.yaml
#
# Each comment lists what the field does + its valid options / range.

# --- Identity / selection -----------------------------------------------------
name: bfs16s2c            # any string. CameraConfig.name: service key, frame.camera_name, logs
model: BFS-U3-16S2C-CS    # any string; advisory label only (printed when the config loads)
serial: null              # string | null. Spinnaker GetBySerial() target (the serial spinview
                          # reports, e.g. "26125061"); stable rebind -> reliable reconnect
                          # (NFR-005). null = fall back to device_index (driver warns).
device_index: 0           # int >= 0. GetByIndex() fallback when serial is null (also OpenCV index)

# --- Hardware characteristics (advisory: drive validate()/docs, NOT sent to camera) -
max_resolution: [1440, 1080]  # [width, height] ints > 0. Sensor max; sets max_pixel_count +
                              # the default resolution. (BFS-U3-16S2C native: 1440 x 1080)
max_fps: 226.0            # float > 0. Sensor max frame rate; advisory / validate() only
bit_depth: 12             # int > 0. ADC bit depth; advisory
dynamic_range_db: 70.9    # float | null; advisory
sensor_format: '1/2.9"'   # string | null; advisory
lens_fov_deg: 52.8        # float | null. Horizontal FOV of the mounted lens; validate()
                          # enforces NFR-004 (>= 30 deg) against this
focal_length_mm: 5.0      # float | null; advisory (lens.py takes focal length as a call arg)

# --- Pixel formats (two distinct fields) --------------------------------------
device_pixel_format: BayerRG8  # string | null. APPLIED to the camera: its on-device PixelFormat
                               # register, set via PySpin "PixelFormat_<value>". Valid = any
                               # GenICam name the camera supports; common: BayerRG8 (native color,
                               # 1 byte/px -> low USB bw), Mono8, Mono16, RGB8, BGR8.
                               # null = leave the device's current format untouched.
output_pixel_format: BGR8      # one of: Mono8 | Mono16 | BGR8 | RGB8 | BayerRG8 (PixelFormat enum).
                               # HOST-side target: each frame is converted to this in
                               # spinnaker_driver._convert(); never touches the camera.

# --- Settable-feature mask ----------------------------------------------------
# A subset (YAML list) of: GAIN, EXPOSURE, FRAME_RATE, RESOLUTION, PIXEL_FORMAT, TRIGGER,
# WHITE_BALANCE, GAMMA, BLACK_LEVEL, BINNING, ROI  ([] = none). Gates set_config() (an
# attribute can only be written if its feature is listed) AND decides which acquisition
# fields below are applied at connect. Here BLACK_LEVEL/GAMMA/PIXEL_FORMAT are declared
# capabilities (settable via set_config later), not applied at connect.
features: [GAIN, EXPOSURE, FRAME_RATE, RESOLUTION, BLACK_LEVEL, GAMMA, PIXEL_FORMAT]

# --- Requested acquisition settings (written to the camera at connect) --------
resolution: [1440, 1080]  # [width, height] ints, 1..max_resolution -> Width/Height (needs
                          # RESOLUTION; OffsetX/Y reset to 0 first). Clamped to device limits.
fps: 60.0                 # float, 1..max_fps -> AcquisitionFrameRate (needs FRAME_RATE).
                          # Clamped to the device range (exposure-limited); 60 meets NFR-001.
exposure_us: 5000.0       # float microseconds -> ExposureTime, sets ExposureAuto=Off (needs
                          # EXPOSURE). Clamped to the device's [min,max]; must be <= 1/fps
                          # (<= 16600 us at 60 fps). Main brightness knob.
gain_db: 0.0              # float dB, ~0..47 -> Gain, sets GainAuto=Off (needs GAIN). Clamped to
                          # the device range. Raise only if still too dark after exposure.

# --- Bandwidth / buffering (multi-camera USB3 rigs; single camera: leave null) -
stream_buffer_count: null         # int | null -> StreamBufferCountManual (mode=Manual). null =
                                  # SDK default. Raise to absorb bursts when cameras share a
                                  # USB3 controller/PCIe lane and drop frames. Watch
                                  # StreamLostFrameCount/StreamDroppedFrameCount in get_health().
link_throughput_limit_bps: null   # int Bytes/s | null -> DeviceLinkThroughputLimit. null = device
                                  # default. THE knob to partition a shared USB3 bus: give each
                                  # camera a slice summing under controller capacity. ~93 MB/s is
                                  # 1440x1080 BayerRG8 @60fps. Below the fps need lowers the rate;
                                  # get_health() reports link_throughput_bps + resulting_fps.

# --- Timestamps ---------------------------------------------------------------
timestamp_sync: false             # bool. false = unchanged path (device hw_timestamp_ns only).
                                  # true -> latch device clock vs host once at connect
                                  # (TimestampLatch/TimestampLatchValue) and tag each frame's
                                  # metadata["host_capture_time_s"] on the host monotonic timebase,
                                  # for correlating frames to host events / other cameras.

# --- Host color correction (raw-Bayer debayer has no ISP -> slight green cast) -
white_balance: none               # none | gray_world | ccm.  none = unchanged (validated path).
                                  # gray_world = cheap numpy per-channel gain (kills the green
                                  # cast; illuminant-agnostic). ccm = Spinnaker color-correction
                                  # matrix for the sensor (colorimetric; per-frame cost). Color is
                                  # cosmetic for cueing; mainly improves the GUI preview.
ccm_color_temp: LED_4649K         # CCM illuminant (white_balance=ccm only). IMX273 supports:
                                  # INCANDESCENT_2765K, HALOGEN_3188K, FLUORESCENT_4665K,
                                  # LED_4649K, LED_H_AND_E_4649K, DAYLIGHT_5034K,
                                  # DAYLIGHT_H_AND_E_5034K. Unsupported -> CCM disabled at connect.
color_algorithm: HQ_LINEAR        # debayer algo: HQ_LINEAR (default) | RIGOROUS |
                                  # WEIGHTED_DIRECTIONAL_FILTER | ... (higher = better but slower).
host_gamma: null                  # float | null. Optional HOST gamma on color frames (e.g. 0.8).
                                  # Distinct from the device Gamma node (set_config("gamma")).

# --- Chunk data (per-frame device metadata; default = FrameID + Timestamp only) -
chunk_crc: false                  # bool. Enable the per-frame CRC chunk and reject CRC-failed
                                  # frames as malformed (NFR-006) — catches corruption that
                                  # incompleteness checks miss.
chunk_telemetry: true             # bool (DEFAULT ON). Enable Exposure/Gain/BlackLevel chunks ->
                                  # the device's ACTUAL per-frame values in frame.metadata
                                  # (chunk_* keys). Purely additive; frames delivered are unchanged.

# --- Reliability knobs (opt-in; HARDWARE-VALIDATION-PENDING) -------------------
soft_reset_on_fault: false        # bool. On a backend fault, issue a DeviceReset (reboot the
                                  # camera) before reconnecting -> recovers a wedged-but-present
                                  # device without a physical unplug.
read_retry_on_fault: 0            # int >= 0. Retry GetNextImage this many times on a NON-fatal,
                                  # non-timeout error before declaring a fault (0 = fault at once).
                                  # Device-fatal codes (removed/aborted) never retry.
packet_resend: false              # bool. Enable stream packet retransmission (largely a GEV
                                  # feature; usually a no-op / absent node on USB3).
